name: Latest blog post workflow
on:
  # Auto-update disabled: the blog-post section is commented out in README.md.
  # To re-enable: uncomment the section, restore its BLOG-POST-LIST markers,
  # and re-add the hourly schedule below.
  #   schedule:
  #     - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: gautamkrishnar/blog-post-workflow@master
        with:
          feed_list: "https://shahayush.com/feed.xml"
