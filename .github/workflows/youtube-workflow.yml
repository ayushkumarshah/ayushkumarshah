name: Latest YouTube Videos
on:
  # Auto-update disabled: the YouTube section is commented out in README.md.
  # To re-enable: uncomment the section, restore its YOUTUBE markers,
  # and re-add the hourly schedule below.
  #   schedule:
  #     - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-readme-with-youtube:
    name: Update this repo's README with latest videos from YouTube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: gautamkrishnar/blog-post-workflow@master
        with:
          comment_tag_name: "YOUTUBE"
          feed_list: "https://www.youtube.com/feeds/videos.xml?channel_id=UCsJiRbazD_eo40sM93njOeQ"
